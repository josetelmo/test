<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matriz BR.ai - Energia e Sustentabilidade</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Configuração de animações do Tailwind -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          animation: {
            'spin': 'spin 1s linear infinite',
            'bounce': 'bounce 1s infinite',
            'pulse': 'pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          }
        }
      }
    }
  </script>

  <!-- React e ReactDOM via CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel para compilar JSX no navegador -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 antialiased">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    // ==========================================
    // COMPONENTE DE ÍCONES (Adaptado para CDN)
    // ==========================================
    // Esta função garante que os ícones renderizam corretamente sem conflitos com o React
    function Icon({ name, className }) {
      const spanRef = useRef(null);
      useEffect(() => {
        if (spanRef.current) {
          spanRef.current.innerHTML = `<i data-lucide="${name}" class="${className || ''}"></i>`;
          lucide.createIcons({ root: spanRef.current });
        }
      }, [name, className]);
      return <span ref={spanRef} style={{ display: 'contents' }}></span>;
    }

    // ==========================================
    // CONFIGURAÇÃO DA API DA IA
    // ==========================================
    // ⚠️ COLOQUE A SUA CHAVE API AQUI
    const apiKey = ""; 

    // ==========================================
    // SERVIÇOS DE IA: Geração de Texto
    // ==========================================
    async function fetchGeminiText(prompt, systemPrompt) {
      if(!apiKey) return "⚠️ Erro: Insira a sua chave API do Gemini no ficheiro index.html (linha 57).";

      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
      const delays = [1000, 2000, 4000, 8000, 16000]; 
      
      for (let i = 0; i < 5; i++) {
        try {
          const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: [{ text: prompt }] }],
              systemInstruction: { parts: [{ text: systemPrompt }] }
            })
          });
          
          if (!response.ok) throw new Error(`Erro HTTP! status: ${response.status}`);
          
          const data = await response.json();
          return data.candidates?.[0]?.content?.parts?.[0]?.text || "Não foi possível gerar uma resposta.";
        } catch (error) {
          if (i === 4) {
            console.error("Falha ao comunicar com a API de Texto", error);
            return "Lamento, ocorreu um erro de ligação ao servidor de IA.";
          }
          await new Promise(res => setTimeout(res, delays[i]));
        }
      }
    }

    // ==========================================
    // SERVIÇOS DE IA: Text-to-Speech (Voz)
    // ==========================================
    function pcmToWav(pcmData, sampleRate = 24000) {
      const numChannels = 1;
      const bitsPerSample = 16;
      const byteRate = sampleRate * numChannels * (bitsPerSample / 8);
      const blockAlign = numChannels * (bitsPerSample / 8);
      const dataSize = pcmData.length;
      const buffer = new ArrayBuffer(44 + dataSize);
      const view = new DataView(buffer);
      
      const writeString = (view, offset, string) => {
        for (let i = 0; i < string.length; i++) {
          view.setUint8(offset + i, string.charCodeAt(i));
        }
      };
      
      writeString(view, 0, 'RIFF');
      view.setUint32(4, 36 + dataSize, true);
      writeString(view, 8, 'WAVE');
      writeString(view, 12, 'fmt ');
      view.setUint32(16, 16, true);
      view.setUint16(20, 1, true);
      view.setUint16(22, numChannels, true);
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, byteRate, true);
      view.setUint16(32, blockAlign, true);
      view.setUint16(34, bitsPerSample, true);
      writeString(view, 36, 'data');
      view.setUint32(40, dataSize, true);
      
      const pcmArray = new Uint8Array(pcmData);
      new Uint8Array(buffer, 44).set(pcmArray);
      return new Blob([buffer], { type: 'audio/wav' });
    }

    async function fetchGeminiAudio(text) {
      if(!apiKey) return null;
      // Usando o modelo TTS suportado
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
      
      try {
        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text }] }],
            generationConfig: {
              responseModalities: ["AUDIO"],
              speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Aoede" } } }
            }
          })
        });
        
        if (!response.ok) throw new Error('Falha na geração de áudio');
        
        const data = await response.json();
        const base64Data = data.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
        if (!base64Data) throw new Error('Sem dados de áudio na resposta');
        
        const binaryString = atob(base64Data);
        const pcmData = new Uint8Array(binaryString.length);
        for (let i = 0; i < binaryString.length; i++) {
          pcmData[i] = binaryString.charCodeAt(i);
        }
        
        const wavBlob = pcmToWav(pcmData, 24000);
        return URL.createObjectURL(wavBlob);
      } catch (error) {
        console.error("Erro na TTS:", error);
        return null;
      }
    }

    // ==========================================
    // COMPONENTES DE UI
    // ==========================================
    function ProgressBar({ label, percentage, color }) {
      return (
        <div>
          <div className="flex justify-between text-sm font-medium mb-1">
            <span className="text-slate-700">{label}</span>
            <span className="text-slate-900">{percentage}%</span>
          </div>
          <div className="w-full bg-slate-100 rounded-full h-2.5">
            <div className={`${color} h-2.5 rounded-full`} style={{ width: `${percentage}%` }}></div>
          </div>
        </div>
      );
    }

    function ChallengeCard({ icon, title, description, color, bg, onAskAI }) {
      return (
        <div className="bg-white rounded-2xl p-6 border border-slate-100 shadow-sm hover:shadow-md transition-all duration-300 flex flex-col h-full group hover:-translate-y-1">
          <div className={`w-12 h-12 rounded-xl flex items-center justify-center mb-4 ${bg} ${color}`}>
            {icon}
          </div>
          <h4 className="text-lg font-bold text-slate-900 mb-2">{title}</h4>
          <p className="text-sm text-slate-600 leading-relaxed mb-6 flex-1">{description}</p>
          
          <button 
            onClick={() => onAskAI(title, description)}
            className="w-full mt-auto py-2.5 px-4 bg-slate-50 hover:bg-emerald-50 text-slate-600 hover:text-emerald-700 border border-slate-200 hover:border-emerald-200 rounded-xl text-sm font-semibold transition-colors flex items-center justify-center gap-2 group-hover:shadow-sm"
          >
            <Icon name="sparkles" className="w-4 h-4 text-emerald-500" /> 
            Gerar Soluções IA
          </button>
        </div>
      );
    }

    function InvestmentRow({ label, value, percentage, color, desc }) {
      return (
        <div>
          <div className="flex justify-between items-end mb-1">
            <div>
              <span className="font-semibold text-white block">{label}</span>
              <span className="text-xs text-slate-400">{desc}</span>
            </div>
            <div className="text-right">
              <span className="text-white font-bold block">{value}</span>
              <span className="text-xs text-slate-400">{percentage}% do total</span>
            </div>
          </div>
          <div className="w-full bg-slate-800 rounded-full h-2 mt-2">
            <div className={`${color} h-2 rounded-full`} style={{ width: `${percentage}%` }}></div>
          </div>
        </div>
      );
    }

    // ==========================================
    // APLICAÇÃO PRINCIPAL
    // ==========================================
    function App() {
      const [activeTab, setActiveTab] = useState('panorama');
      
      const [aiModal, setAiModal] = useState({ isOpen: false, title: '', content: '', isLoading: false });

      const [audioState, setAudioState] = useState({ isPlaying: false, isLoading: false, url: null });
      const audioRef = useRef(null);

      const [chatOpen, setChatOpen] = useState(false);
      const [chatMessages, setChatMessages] = useState([
        { role: 'ai', text: 'Olá! Sou o seu Assistente Virtual com IA ✨. Posso fornecer análises profundas sobre a matriz energética brasileira. Como posso ajudar?' }
      ]);
      const [chatInput, setChatInput] = useState('');
      const [isChatLoading, setIsChatLoading] = useState(false);
      const chatEndRef = useRef(null);

      const [newsletterData, setNewsletterData] = useState({ nome: '', email: '', whatsapp: '' });
      const [isSubscribed, setIsSubscribed] = useState(false);

      useEffect(() => {
        if (chatEndRef.current) {
          chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
        }
      }, [chatMessages, chatOpen]);

      useEffect(() => {
        return () => {
          if (audioState.url) URL.revokeObjectURL(audioState.url);
        };
      }, [audioState.url]);

      const handleGenerateSolution = async (title, description) => {
        setAiModal({ isOpen: true, title: `A analisar: ${title}`, content: '', isLoading: true });
        
        const systemPrompt = "És um perito mundial em transição climática. Responde em português de forma estruturada, profissional e utilizando bullet points curtos.";
        const userPrompt = `Desafio no Brasil:\nProblema: ${title}\nDescrição: ${description}\n\nSugere 3 soluções inovadoras (tecnológicas ou políticas).`;
        
        const response = await fetchGeminiText(userPrompt, systemPrompt);
        
        setAiModal({
          isOpen: true,
          title: `✨ Soluções IA: ${title}`,
          content: response,
          isLoading: false
        });
      };

      const handleSubscribe = (e) => {
        e.preventDefault();
        setIsSubscribed(true);
        
        setTimeout(() => {
          setIsSubscribed(false);
          setNewsletterData({ nome: '', email: '', whatsapp: '' });
        }, 5000);
      };

      const handlePlayAudio = async () => {
        if(!apiKey) {
           alert("Por favor, adicione a sua Chave API do Gemini no código para usar o áudio.");
           return;
        }

        if (audioState.isPlaying && audioRef.current) {
          audioRef.current.pause();
          setAudioState({ ...audioState, isPlaying: false });
          return;
        }

        if (audioState.url) {
          audioRef.current.play();
          setAudioState({ ...audioState, isPlaying: true });
          return;
        }

        setAudioState({ ...audioState, isLoading: true });
        
        const textoParaLer = "Bem-vindo. A matriz energética do Brasil é uma das mais limpas do mundo, com quarenta e oito por cento de fontes renováveis. Até 2035, estão previstos investimentos de quatro triliões de reais. Explore a nossa plataforma interativa para saber mais.";
        
        const audioUrl = await fetchGeminiAudio(textoParaLer);
        
        if (audioUrl) {
          setAudioState({ isLoading: false, isPlaying: true, url: audioUrl });
          if (!audioRef.current) {
            audioRef.current = new Audio(audioUrl);
            audioRef.current.onended = () => setAudioState(prev => ({ ...prev, isPlaying: false }));
          } else {
            audioRef.current.src = audioUrl;
          }
          audioRef.current.play();
        } else {
          setAudioState({ ...audioState, isLoading: false });
          alert("Não foi possível carregar o áudio no momento. Verifique a consola para mais erros.");
        }
      };

      const handleSendMessage = async (e) => {
        e.preventDefault();
        if (!chatInput.trim() || isChatLoading) return;

        const userText = chatInput;
        setChatMessages(prev => [...prev, { role: 'user', text: userText }]);
        setChatInput('');
        setIsChatLoading(true);

        const systemPrompt = "És um assistente virtual especialista no setor energético brasileiro. Sê conciso, profissional e utiliza formatação (negrito) quando necessário. Os teus conhecimentos baseiam-se no Balanço Energético Nacional e no Plano de 4 Triliões de Reais até 2035.";
        const historyContext = chatMessages.slice(-4).map(m => `${m.role === 'ai' ? 'IA' : 'Utilizador'}: ${m.text}`).join('\n');
        const prompt = `Histórico:\n${historyContext}\n\nUtilizador: ${userText}\n\nResponde diretamente à questão atual.`;

        const responseText = await fetchGeminiText(prompt, systemPrompt);
        
        setChatMessages(prev => [...prev, { role: 'ai', text: responseText }]);
        setIsChatLoading(false);
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans text-slate-800 pb-20 md:pb-0">
          <header className="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-slate-200 shadow-sm">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex justify-between items-center h-20">
                <div className="flex items-center gap-2">
                  <div className="bg-emerald-600 p-2 rounded-lg shadow-inner">
                    <Icon name="leaf" className="w-6 h-6 text-white" />
                  </div>
                  <div>
                    <h1 className="text-xl font-bold text-slate-900 leading-tight">Matriz BR<span className="text-emerald-600">.ai</span></h1>
                    <p className="text-xs text-slate-500 font-semibold tracking-wider uppercase">Plataforma Inteligente</p>
                  </div>
                </div>
                <nav className="hidden md:flex space-x-8">
                  <button onClick={() => setActiveTab('panorama')} className={`text-sm font-medium transition-colors pb-1 ${activeTab === 'panorama' ? 'text-emerald-600 border-b-2 border-emerald-600' : 'text-slate-500 hover:text-slate-900'}`}>Visão Geral</button>
                  <button onClick={() => setActiveTab('desafios')} className={`text-sm font-medium transition-colors pb-1 ${activeTab === 'desafios' ? 'text-emerald-600 border-b-2 border-emerald-600' : 'text-slate-500 hover:text-slate-900'}`}>Desafios Setoriais</button>
                  <button onClick={() => setActiveTab('investimentos')} className={`text-sm font-medium transition-colors pb-1 ${activeTab === 'investimentos' ? 'text-emerald-600 border-b-2 border-emerald-600' : 'text-slate-500 hover:text-slate-900'}`}>Mapa de Investimentos</button>
                </nav>
                <div className="hidden lg:flex items-center gap-3">
                   <button 
                    onClick={handlePlayAudio}
                    disabled={audioState.isLoading}
                    className="flex items-center gap-2 text-sm font-medium text-emerald-700 bg-emerald-50 hover:bg-emerald-100 px-4 py-2 rounded-full transition-colors border border-emerald-200"
                  >
                    {audioState.isLoading ? <Icon name="loader-2" className="w-4 h-4 animate-spin" /> : 
                     audioState.isPlaying ? <Icon name="stop-circle" className="w-4 h-4" /> : <Icon name="volume-2" className="w-4 h-4" />}
                    {audioState.isPlaying ? 'Parar Áudio' : 'Ouvir Síntese'}
                  </button>
                </div>
              </div>
            </div>
          </header>

          <section className="relative bg-slate-900 text-white overflow-hidden">
            <div className="absolute inset-0 opacity-20 bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-emerald-400 via-emerald-800 to-transparent pointer-events-none"></div>
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-20 relative z-10">
              <div className="max-w-3xl">
                <div className="flex flex-wrap items-center gap-3 mb-6">
                  <span className="inline-flex py-1 px-3 rounded-full bg-emerald-500/20 border border-emerald-500/30 text-emerald-300 text-xs font-bold uppercase tracking-wide items-center gap-2">
                    <Icon name="sparkles" className="w-3.5 h-3.5" /> Alimentado por IA
                  </span>
                  <span className="inline-flex py-1 px-3 rounded-full bg-blue-500/20 border border-blue-500/30 text-blue-300 text-xs font-bold uppercase tracking-wide items-center gap-2">
                    <Icon name="activity" className="w-3.5 h-3.5" /> Dados em Tempo Real
                  </span>
                </div>
                
                <h2 className="text-4xl md:text-5xl lg:text-6xl font-extrabold tracking-tight mb-6 leading-tight">
                  O Futuro da Energia no Brasil: <span className="text-emerald-400">Sustentabilidade</span>
                </h2>
                <p className="text-lg md:text-xl text-slate-300 mb-8 leading-relaxed max-w-2xl">
                  Uma plataforma enriquecida com Inteligência Artificial para explorar a transição energética do Brasil e o potencial de investimento de <strong>R$ 4 Triliões</strong>.
                </p>
                
                <div className="flex flex-col gap-6">
                  <div className="flex flex-wrap gap-4">
                    <button onClick={() => setActiveTab('investimentos')} className="bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-3.5 rounded-xl font-medium transition-all flex items-center gap-2 shadow-lg shadow-emerald-900/50 hover:shadow-emerald-900/70">
                      Explorar Investimentos <Icon name="chevron-right" className="w-5 h-5" />
                    </button>
                  </div>

                  {/* Formulário de Newsletter */}
                  <div className="bg-slate-800/40 backdrop-blur-md border border-slate-700/50 p-5 rounded-2xl max-w-2xl mt-2">
                    <h3 className="text-sm font-semibold text-emerald-400 mb-4 flex items-center gap-2 uppercase tracking-wider">
                      <Icon name="send" className="w-4 h-4" /> Assine nossa Newsletter
                    </h3>
                    {isSubscribed ? (
                      <div className="bg-emerald-500/20 text-emerald-300 p-4 rounded-xl border border-emerald-500/30 text-sm flex items-center gap-2">
                        <Icon name="sparkles" className="w-4 h-4" />
                        Obrigado, {newsletterData.nome.split(' ')[0]}! Inscrição realizada com sucesso.
                      </div>
                    ) : (
                      <form onSubmit={handleSubscribe} className="flex flex-col sm:flex-row gap-3">
                        <input 
                          required 
                          type="text" 
                          placeholder="Nome" 
                          value={newsletterData.nome}
                          onChange={(e) => setNewsletterData({...newsletterData, nome: e.target.value})}
                          className="flex-1 bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-2.5 text-sm text-white focus:ring-2 focus:ring-emerald-500 focus:border-transparent outline-none transition-all placeholder:text-slate-500" 
                        />
                        <input 
                          required 
                          type="tel" 
                          placeholder="WhatsApp" 
                          value={newsletterData.whatsapp}
                          onChange={(e) => setNewsletterData({...newsletterData, whatsapp: e.target.value})}
                          className="flex-1 bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-2.5 text-sm text-white focus:ring-2 focus:ring-emerald-500 focus:border-transparent outline-none transition-all placeholder:text-slate-500" 
                        />
                        <input 
                          required 
                          type="email" 
                          placeholder="E-mail" 
                          value={newsletterData.email}
                          onChange={(e) => setNewsletterData({...newsletterData, email: e.target.value})}
                          className="flex-1 bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-2.5 text-sm text-white focus:ring-2 focus:ring-emerald-500 focus:border-transparent outline-none transition-all placeholder:text-slate-500" 
                        />
                        <button type="submit" className="bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-2.5 rounded-xl font-medium transition-all text-sm whitespace-nowrap shadow-lg shadow-emerald-900/30">
                          Assinar
                        </button>
                      </form>
                    )}
                  </div>
                </div>
              </div>
            </div>
          </section>

          <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
            
            {activeTab === 'panorama' && (
              <div className="space-y-16 animate-in fade-in duration-500">
                <div className="text-center max-w-2xl mx-auto mb-12">
                  <h3 className="text-3xl font-bold text-slate-900 mb-4">A Diferença Crucial</h3>
                  <p className="text-slate-600">
                    A IA analisa a discrepância entre a <strong>Matriz Energética</strong> (consumo total) e a <strong>Matriz Elétrica</strong> (produção de eletricidade), demonstrando o avanço sustentável do país.
                  </p>
                </div>

                <div className="grid md:grid-cols-2 gap-8">
                  <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-8 hover:shadow-md transition-shadow">
                    <div className="flex items-center gap-4 mb-6">
                      <div className="bg-amber-100 p-3 rounded-xl">
                        <Icon name="activity" className="w-6 h-6 text-amber-600" />
                      </div>
                      <h4 className="text-xl font-bold text-slate-900">Matriz Energética</h4>
                    </div>
                    <p className="text-slate-600 mb-6 text-sm">Equilibra fontes renováveis (aprox. 48%) e fósseis. Inclui todo o consumo de combustíveis dos transportes.</p>
                    <div className="space-y-4">
                      <ProgressBar label="Petróleo e Derivados" percentage={34} color="bg-slate-800" />
                      <ProgressBar label="Biomassa (Cana/Etanol)" percentage={18} color="bg-emerald-500" />
                      <ProgressBar label="Hidrelétrica" percentage={12} color="bg-blue-500" />
                      <ProgressBar label="Gás Natural" percentage={11} color="bg-orange-500" />
                      <ProgressBar label="Outras Renováveis" percentage={10} color="bg-yellow-400" />
                    </div>
                  </div>

                  <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-8 hover:shadow-md transition-shadow">
                    <div className="flex items-center gap-4 mb-6">
                      <div className="bg-blue-100 p-3 rounded-xl">
                        <Icon name="zap" className="w-6 h-6 text-blue-600" />
                      </div>
                      <h4 className="text-xl font-bold text-slate-900">Matriz Elétrica</h4>
                    </div>
                    <p className="text-slate-600 mb-6 text-sm">Altamente limpa, com mais de 80% proveniente de fontes renováveis, destacando-se a nível mundial.</p>
                    <div className="space-y-4">
                      <ProgressBar label="Hidrelétrica" percentage={60} color="bg-blue-500" />
                      <ProgressBar label="Eólica" percentage={13} color="bg-teal-400" />
                      <ProgressBar label="Biomassa" percentage={8} color="bg-emerald-500" />
                      <ProgressBar label="Solar" percentage={7} color="bg-yellow-400" />
                      <ProgressBar label="Gás Natural / Térmicas" percentage={8} color="bg-orange-500" />
                    </div>
                  </div>
                </div>

                <div className="bg-gradient-to-br from-emerald-50 to-teal-50 rounded-2xl p-8 flex flex-col md:flex-row items-center gap-8 border border-emerald-100 shadow-sm relative overflow-hidden">
                  <div className="absolute -right-10 -top-10 text-emerald-100 opacity-50">
                    <Icon name="globe-2" className="w-64 h-64" />
                  </div>
                  <div className="bg-emerald-100 p-4 rounded-full flex-shrink-0 relative z-10">
                    <Icon name="globe-2" className="w-10 h-10 text-emerald-600" />
                  </div>
                  <div className="relative z-10">
                    <h4 className="text-xl font-bold text-emerald-900 mb-2">Destaque Global (Insight IA)</h4>
                    <p className="text-emerald-800/80 leading-relaxed">
                      A participação brasileira em fontes renováveis é <strong>quatro vezes superior à média global</strong>. Enquanto grande parte do mundo ainda luta contra o carvão, o Brasil acelera rapidamente as energias eólica e solar.
                    </p>
                  </div>
                </div>
              </div>
            )}

            {activeTab === 'desafios' && (
              <div className="space-y-12 animate-in fade-in duration-500">
                <div className="text-center max-w-2xl mx-auto mb-12">
                  <span className="text-emerald-600 font-bold uppercase tracking-wider text-sm mb-2 block">Identificação de Riscos</span>
                  <h3 className="text-3xl font-bold text-slate-900 mb-4">Gargalos Setoriais</h3>
                  <p className="text-slate-600">
                    Clique no botão de IA em qualquer dos desafios abaixo para gerar um plano de mitigação estratégico em tempo real.
                  </p>
                </div>

                <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                  <ChallengeCard 
                    icon={<Icon name="sun" className="w-6 h-6" />} title="Vulnerabilidade Climática"
                    description="Secas severas comprometem os reservatórios hídricos, forçando o uso de energia fóssil (termoelétricas) e inflacionando as tarifas."
                    color="text-orange-600" bg="bg-orange-100" onAskAI={handleGenerateSolution}
                  />
                  <ChallengeCard 
                    icon={<Icon name="zap" className="w-6 h-6" />} title="Infraestrutura de Transmissão"
                    description="Produção crescente no Nordeste esbarra na limitação de capacidade das linhas de transmissão para escoar energia para o Sudeste."
                    color="text-blue-600" bg="bg-blue-100" onAskAI={handleGenerateSolution}
                  />
                  <ChallengeCard 
                    icon={<Icon name="battery" className="w-6 h-6" />} title="Armazenamento (Baterias)"
                    description="A volatilidade do sol e vento requer baterias à escala de rede. Os altos custos e a dependência externa de lítio atrasam a adoção."
                    color="text-purple-600" bg="bg-purple-100" onAskAI={handleGenerateSolution}
                  />
                  <ChallengeCard 
                    icon={<Icon name="factory" className="w-6 h-6" />} title="Descarbonização Industrial"
                    description="Setores como a siderurgia e o cimento têm grande dificuldade tecnológica e económica na eletrificação dos seus processos base."
                    color="text-slate-700" bg="bg-slate-200" onAskAI={handleGenerateSolution}
                  />
                  <ChallengeCard 
                    icon={<Icon name="alert-triangle" className="w-6 h-6" />} title="Licenciamento Ambiental"
                    description="O tempo e a burocracia necessários para aprovar novos parques eólicos ou linhas de transmissão afasta investidores estrangeiros."
                    color="text-red-600" bg="bg-red-100" onAskAI={handleGenerateSolution}
                  />
                  <ChallengeCard 
                    icon={<Icon name="lightbulb" className="w-6 h-6" />} title="Hidrogénio Verde"
                    description="Falta de enquadramento regulatório final e altos custos de eletrólise dificultam o arranque dos grandes polos de exportação planeados."
                    color="text-emerald-600" bg="bg-emerald-100" onAskAI={handleGenerateSolution}
                  />
                </div>
              </div>
            )}

            {activeTab === 'investimentos' && (
              <div className="space-y-12 animate-in fade-in duration-500">
                <div className="bg-slate-900 rounded-3xl p-8 md:p-12 text-white shadow-xl relative overflow-hidden border border-slate-800">
                  <div className="absolute -top-32 -right-32 w-96 h-96 bg-emerald-500 rounded-full blur-[120px] opacity-20 pointer-events-none"></div>
                  
                  <div className="grid lg:grid-cols-2 gap-12 items-center relative z-10">
                    <div>
                      <span className="inline-flex items-center gap-2 py-1 px-3 rounded-full bg-slate-800 border border-slate-700 text-slate-300 text-xs font-bold uppercase tracking-wide mb-6">
                        <Icon name="trending-up" className="w-4 h-4 text-emerald-400" /> Perspetivas MME 2035
                      </span>
                      <h3 className="text-3xl md:text-4xl font-bold mb-6 leading-tight">
                        Plano Diretor de Expansão
                      </h3>
                      <p className="text-slate-400 text-lg mb-8 leading-relaxed">
                        O Governo desenhou uma estratégia focada na neoindustrialização sustentável. O intuito não é apenas gerar energia limpa, mas tornar o Brasil no maior polo exportador de economia verde.
                      </p>
                      <div className="bg-slate-800/60 backdrop-blur-md rounded-2xl p-8 border border-slate-700/50">
                        <p className="text-sm text-slate-400 uppercase tracking-wider font-semibold mb-2">Estimativa de Capital</p>
                        <p className="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-teal-300">R$ 4 Triliões</p>
                        <p className="text-slate-400 mt-3 text-sm">Financiamento combinado projetado.</p>
                      </div>
                    </div>
                    
                    <div className="space-y-6 bg-slate-800/30 p-8 rounded-2xl border border-slate-700/50 backdrop-blur-sm">
                      <h4 className="text-xl font-semibold border-b border-slate-700 pb-4 flex items-center gap-3">
                        <Icon name="bar-chart-3" className="w-5 h-5 text-emerald-400" /> Alocação de Capital
                      </h4>
                      
                      <InvestmentRow label="Petróleo e Gás (Transição)" value="R$ 2.489 Bi" percentage={78.1} color="bg-slate-400" desc="Segurança energética" />
                      <InvestmentRow label="Infraestrutura Elétrica" value="R$ 597 Bi" percentage={18.7} color="bg-yellow-400" desc="Geração distribuída e eólicas" />
                      <InvestmentRow label="Biocombustíveis & SAF" value="R$ 102 Bi" percentage={3.2} color="bg-emerald-500" desc="Aviação sustentável e hidrogénio" />
                    </div>
                  </div>
                </div>

                <div className="grid md:grid-cols-3 gap-6">
                  <div className="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm flex flex-col items-center text-center">
                    <div className="w-14 h-14 rounded-full bg-emerald-50 flex items-center justify-center mb-4 border border-emerald-100">
                      <Icon name="droplet" className="w-6 h-6 text-emerald-600" />
                    </div>
                    <h4 className="font-bold text-slate-900 mb-3">Hubs de Hidrogénio</h4>
                    <p className="text-sm text-slate-600">Portos como Pecém (CE) e Suape (PE) estão a atrair dezenas de biliões para exportação.</p>
                  </div>
                  <div className="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm flex flex-col items-center text-center">
                    <div className="w-14 h-14 rounded-full bg-blue-50 flex items-center justify-center mb-4 border border-blue-100">
                      <Icon name="wind" className="w-6 h-6 text-blue-600" />
                    </div>
                    <h4 className="font-bold text-slate-900 mb-3">Eólica Offshore</h4>
                    <p className="text-sm text-slate-600">Um novo mercado com pedidos no IBAMA que somam mais capacidade que toda a rede atual.</p>
                  </div>
                  <div className="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm flex flex-col items-center text-center">
                    <div className="w-14 h-14 rounded-full bg-amber-50 flex items-center justify-center mb-4 border border-amber-100">
                      <Icon name="sun" className="w-6 h-6 text-amber-600" />
                    </div>
                    <h4 className="font-bold text-slate-900 mb-3">Geração Distribuída</h4>
                    <p className="text-sm text-slate-600">A instalação de painéis solares em telhados tornou-se num dos maiores motores de emprego.</p>
                  </div>
                </div>
              </div>
            )}
          </main>

          {aiModal.isOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center px-4 bg-slate-900/60 backdrop-blur-sm p-4">
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[85vh] flex flex-col overflow-hidden animate-in zoom-in-95 duration-200">
                <div className="p-5 border-b border-slate-100 flex justify-between items-center bg-emerald-50/50">
                  <h3 className="font-bold text-slate-800 flex items-center gap-2 text-lg">
                    <Icon name="sparkles" className="w-5 h-5 text-emerald-600" />
                    {aiModal.title}
                  </h3>
                  <button onClick={() => setAiModal({ ...aiModal, isOpen: false })} className="p-2 hover:bg-slate-200 rounded-full transition-colors text-slate-500">
                    <Icon name="x" className="w-5 h-5" />
                  </button>
                </div>
                
                <div className="p-6 overflow-y-auto flex-1 bg-white">
                  {aiModal.isLoading ? (
                    <div className="flex flex-col items-center justify-center py-16 text-slate-400">
                      <Icon name="loader-2" className="w-10 h-10 animate-spin text-emerald-500 mb-4" />
                      <p className="font-medium text-slate-500">O Gemini está a processar os dados setoriais...</p>
                    </div>
                  ) : (
                    <div className="prose prose-emerald max-w-none text-slate-700 whitespace-pre-line leading-relaxed">
                      {aiModal.content.split('\n').map((line, i) => {
                        if (line.startsWith('**') || line.startsWith('##')) {
                          return <strong key={i} className="block mt-4 mb-2 text-slate-900 text-lg">{line.replace(/[*#]/g, '')}</strong>;
                        }
                        if (line.startsWith('*')) {
                          return <li key={i} className="ml-4 mb-2">{line.replace('*', '')}</li>;
                        }
                        return <p key={i} className="mb-2">{line}</p>;
                      })}
                    </div>
                  )}
                </div>
                <div className="p-4 bg-slate-50 border-t border-slate-100 text-xs text-center text-slate-500">
                  O conteúdo gerado pela IA pode apresentar imprecisões. Verifique as informações importantes.
                </div>
              </div>
            </div>
          )}

          <div className="fixed bottom-6 right-6 z-50 flex flex-col items-end">
            {chatOpen && (
              <div className="bg-white w-[350px] sm:w-[400px] h-[550px] max-h-[75vh] rounded-2xl shadow-2xl border border-slate-200 mb-4 flex flex-col overflow-hidden animate-in duration-300">
                <div className="bg-slate-900 p-4 text-white flex justify-between items-center shadow-md z-10">
                  <div className="flex items-center gap-3">
                    <div className="bg-emerald-500 p-2 rounded-full relative">
                      <Icon name="sparkles" className="w-4 h-4 text-white" />
                      <span className="absolute bottom-0 right-0 w-2.5 h-2.5 bg-green-400 border-2 border-slate-900 rounded-full"></span>
                    </div>
                    <div>
                      <h4 className="font-semibold text-sm leading-tight">Analista de Energia (IA)</h4>
                      <span className="text-xs text-slate-400">Online e pronto a ajudar</span>
                    </div>
                  </div>
                  <button onClick={() => setChatOpen(false)} className="hover:bg-slate-800 p-1.5 rounded-lg transition-colors text-slate-300">
                    <Icon name="x" className="w-5 h-5" />
                  </button>
                </div>
                
                <div className="flex-1 overflow-y-auto p-4 bg-slate-50 space-y-4">
                  {chatMessages.map((msg, i) => (
                    <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                      {msg.role === 'ai' && (
                        <div className="w-6 h-6 rounded-full bg-emerald-100 border border-emerald-200 flex items-center justify-center mr-2 flex-shrink-0 mt-1">
                          <Icon name="sparkles" className="w-3 h-3 text-emerald-600" />
                        </div>
                      )}
                      <div className={`max-w-[80%] rounded-2xl px-4 py-3 text-sm leading-relaxed shadow-sm ${msg.role === 'user' ? 'bg-emerald-600 text-white rounded-tr-none' : 'bg-white border border-slate-200 text-slate-700 rounded-tl-none whitespace-pre-line'}`}>
                        {msg.text.replace(/\*\*(.*?)\*\*/g, '$1')}
                      </div>
                    </div>
                  ))}
                  {isChatLoading && (
                    <div className="flex justify-start items-center gap-2">
                      <div className="w-6 h-6 rounded-full bg-emerald-100 border border-emerald-200 flex items-center justify-center flex-shrink-0">
                        <Icon name="sparkles" className="w-3 h-3 text-emerald-600" />
                      </div>
                      <div className="bg-white border border-slate-200 text-slate-400 rounded-2xl rounded-tl-none px-4 py-3 shadow-sm flex items-center gap-2 text-sm">
                        <span className="flex gap-1">
                          <span className="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce"></span>
                          <span className="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce" style={{animationDelay: '0.2s'}}></span>
                          <span className="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce" style={{animationDelay: '0.4s'}}></span>
                        </span>
                      </div>
                    </div>
                  )}
                  <div ref={chatEndRef} />
                </div>
                
                <form onSubmit={handleSendMessage} className="p-3 bg-white border-t border-slate-100">
                  <div className="relative flex items-center">
                    <input 
                      type="text" 
                      value={chatInput}
                      onChange={(e) => setChatInput(e.target.value)}
                      placeholder="Pergunte sobre os investimentos..." 
                      className="w-full bg-slate-100 border-none rounded-full pl-5 pr-12 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all shadow-inner"
                      disabled={isChatLoading}
                    />
                    <button 
                      type="submit" 
                      disabled={!chatInput.trim() || isChatLoading}
                      className="absolute right-1 bg-emerald-600 text-white p-2 rounded-full hover:bg-emerald-700 transition-all disabled:opacity-0 disabled:scale-75 scale-100 flex items-center justify-center"
                    >
                      <Icon name="send" className="w-4 h-4 ml-0.5" />
                    </button>
                  </div>
                </form>
              </div>
            )}
            
            <button 
              onClick={() => setChatOpen(!chatOpen)}
              className={`${chatOpen ? 'bg-slate-800 hover:bg-slate-700' : 'bg-emerald-600 hover:bg-emerald-500'} text-white p-4 rounded-full shadow-xl shadow-emerald-900/20 transition-all hover:scale-105 flex items-center gap-2 font-medium z-50`}
            >
              {chatOpen ? <Icon name="x" className="w-6 h-6" /> : (
                <React.Fragment>
                  <Icon name="message-circle" className="w-6 h-6" />
                  <span className="hidden sm:inline font-semibold">Assistente IA</span>
                  <Icon name="sparkles" className="w-4 h-4 animate-pulse" />
                </React.Fragment>
              )}
            </button>
          </div>

          <footer className="bg-slate-900 text-slate-400 py-10 border-t border-slate-800">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center gap-4">
              <div className="flex items-center gap-2">
                <Icon name="leaf" className="w-5 h-5 text-emerald-500" />
                <span className="text-white font-semibold">Matriz BR.ai</span>
              </div>
              <p className="text-sm text-center md:text-right">
                Desenvolvido com IA Avançada.<br />
                Dados: Relatório BEN 2025 e PDE 2034 (MME).
              </p>
            </div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
